<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">

  <title>SQL Матеріали — Основи SQL</title>
  <meta name="description" content="Інтерактивні матеріали для вивчення SQL — SELECT, WHERE, DISTINCT, ORDER BY та інші основи">
  <link rel="stylesheet" href="./sql/static/style.css">
</head>
<body>
  <div class="container">
    <!-- Sidebar with course navigation -->
    <aside class="sidebar">
      <div class="sidebar-header">

      </div>
      <nav class="course-nav"></nav>
    </aside>
    <!-- Main content area -->
    <main id="content"></main>

    </main>
  </div>
  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/alasql/4.2.0/alasql.min.js"></script>
